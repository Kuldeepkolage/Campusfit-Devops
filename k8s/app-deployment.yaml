apiVersion: apps/v1
kind: Deployment

metadata:
  name: campusfit-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: campusfit

  template:
    metadata:
      labels:
        app: campusfit

    spec:
      containers:
      - name: campusfit

        image: kuldeepkolage/campusfit-app:v1

        ports:
        - containerPort: 3000

        env:
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: PORT

        - name: APP_ENV
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: APP_ENV

        - name: MONGO_URI
          value: mongodb://admin:password@mongodb-service:27017/campusfit_db?authSource=admin

        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 20
          periodSeconds: 10

        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5

        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"

          limits:
            memory: "256Mi"
            cpu: "200m"
