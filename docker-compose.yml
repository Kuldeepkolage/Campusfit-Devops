version: '3.8'

services:
  mongodb:
    image: mongo
    container_name: mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: campusfit_user
      MONGO_INITDB_ROOT_PASSWORD: campusfit_password
    volumes:
      - mongo-data:/data/db

  app:
    build: .
    container_name: campusfit-app
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - mongodb
    environment:
      PORT: 3000
      APP_ENV: development
      MONGO_URI: mongodb://campusfit_user:campusfit_password@mongodb:27017/campusfit_db?authSource=admin

volumes:
  mongo-data:
